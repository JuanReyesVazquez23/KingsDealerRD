<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — KingsDealer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #0A0A0A;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 4px;
      color: #FFFFFF;
      margin-bottom: 4px;
    }
    .logo span { color: #CC0000; }
    .icon { font-size: 4rem; margin: 24px 0 16px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 2px; margin-bottom: 12px; }
    p  { color: #BBBBBB; line-height: 1.6; max-width: 320px; margin-bottom: 32px; }
    a  {
      background: #CC0000;
      color: #fff;
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 14px 32px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s;
    }
    a:hover { background: #990000; }
  </style>
</head>
<body>
  <div class="logo">Kings<span>Dealer</span></div>
  <div class="icon">🚗</div>
  <h1>Sin conexión</h1>
  <p>Necesitas conexión a internet para ver el catálogo de vehículos. Reconéctate y vuelve a intentarlo.</p>
  <a href="/">Reintentar</a>
</body>
</html>
