{% extends "base.html" %}
{% block title %}Acceso Admin — KingsDealer{% endblock %}

{% block body %}
<div class="login-page">
  <div class="login-bg"></div>

  <div class="login-card">
    <a href="/" class="login-logo">
      <div>
        <span class="logo-main">Kings</span>
        <span class="logo-sub">Dealer</span>
      </div>
    </a>

    <h1 class="login-title">Acceso Restringido</h1>
    <p class="login-sub">Panel de administración</p>

    {% if error %}
      <div class="login-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" class="login-form" id="loginForm">
      <div class="login-field">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          name="username"
          autocomplete="username"
          placeholder="admin"
          required
          autofocus
        />
      </div>
      <div class="login-field">
        <label for="password">Contraseña</label>
        <div class="pw-wrap">
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
          />
          <button type="button" class="pw-toggle" onclick="togglePw()" aria-label="Ver contraseña">👁</button>
        </div>
      </div>
      <button type="submit" class="btn-primary full" id="loginBtn">Ingresar</button>
    </form>

    <a href="/" class="login-back">← Volver al sitio</a>
  </div>
</div>

<script>
function togglePw() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
document.getElementById('loginForm').addEventListener('submit', function() {
  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loginBtn').textContent = 'Verificando…';
});
</script>
{% endblock %}
